<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 旅行攻略</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FDF8F3;
            --bg-card: #FFFFFF;
            --primary-pink: #FF6B6B;
            --secondary-peach: #FFB88C;
            --accent-orange: #FF9F43;
            --text-dark: #2D3436;
            --text-gray: #636E72;
            --shadow-soft: 0 8px 30px rgba(255, 107, 107, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .font-cute {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            padding: 0 2rem;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-brand {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.5rem;
            color: var(--primary-pink);
            text-decoration: none;
        }

        .navbar-nav {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-btn-home {
            background: #f0f0f0;
            color: var(--text-dark);
        }

        .nav-btn-home:hover {
            background: #e0e0e0;
        }

        .nav-btn-csv {
            background: linear-gradient(135deg, var(--primary-pink), var(--accent-orange));
            color: white;
        }

        .nav-btn-csv:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .nav-btn-ai {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .nav-btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 1.5rem 3rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        /* AI 聊天区域 */
        .chat-container {
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }

        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .chat-messages {
            padding: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message-user .message-avatar {
            background: var(--primary-pink);
        }

        .message-ai .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .message-content {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            flex: 1;
            line-height: 1.6;
        }

        .message-user .message-content {
            background: linear-gradient(135deg, #FFECD2 0%, #FCB69F 100%);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-gray);
            margin-top: 0.5rem;
        }

        .chat-input-area {
            padding: 1rem;
            background: #f8f9fa;
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-send-btn {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 快捷问题 */
        .quick-questions {
            padding: 1rem 1.5rem;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .quick-questions-title {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0.8rem;
        }

        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .quick-btn {
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        /* 功能卡片 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .feature-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.2);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .feature-card p {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 1rem;
            }

            .navbar-brand {
                font-size: 1.2rem;
            }

            .nav-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }

            .container {
                padding: 80px 1rem 2rem;
            }

            .page-header h1 {
                font-size: 1.8rem;
            }

            .chat-messages {
                max-height: 300px;
            }
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="./" class="navbar-brand">大同→太原→南京</a>
            <div class="navbar-nav">
                <a href="./csv" class="nav-btn nav-btn-csv">
                    <span>📊</span> CSV
                </a>
                <a href="./ai-assistant" class="nav-btn nav-btn-ai">
                    <span>🤖</span> AI助手
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header fade-in">
            <h1 class="font-cute">🤖 AI 旅行助手</h1>
            <p>智能规划您的大同-太原-南京之旅</p>
        </div>

        <!-- AI 聊天界面 -->
        <div class="chat-container fade-in">
            <div class="chat-header">
                <h2 class="font-cute">旅行小助手</h2>
                <p>基于旅行攻略数据，24小时为您服务</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message message-ai">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        您好！我是您的旅行AI助手。基于大同-太原-南京的旅行攻略，我可以帮您：
                        <br><br>
                        📍 规划行程路线<br>
                        💰 计算预算费用<br>
                        🍜 推荐当地美食<br>
                        🏨 预订酒店住宿<br>
                        🎫 规划景点游览顺序<br>
                        <br>
                        请告诉我您想去哪里，或者选择下方的快捷问题！
                    </div>
                </div>
            </div>

            <div class="quick-questions">
                <div class="quick-questions-title">快捷问题：</div>
                <div class="quick-btns">
                    <button class="quick-btn" onclick="askQuestion('去南京博物院需要提前预约吗？')">南京博物院预约</button>
                    <button class="quick-btn" onclick="askQuestion('云冈石窟游览需要多长时间？')">云冈石窟游览时间</button>
                    <button class="quick-btn" onclick="askQuestion('太原到南京的高铁票价是多少？')">太原到南京票价</button>
                    <button class="quick-btn" onclick="askQuestion('推荐一些大同的美食')">大同美食推荐</button>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea class="chat-input" id="chatInput" placeholder="输入您的问题..." rows="1"></textarea>
                <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>

        <!-- 功能卡片 -->
        <div class="features-grid fade-in">
            <div class="feature-card">
                <div class="feature-icon">🗺️</div>
                <h3>智能行程规划</h3>
                <p>根据您的偏好和时间，生成最优行程路线</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💰</div>
                <h3>预算智能分析</h3>
                <p>精确计算各项开支，帮您省钱</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🍜</div>
                <h3>美食推荐</h3>
                <p>当地人推荐的小众美食店</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📸</div>
                <h3>拍照攻略</h3>
                <p>最佳拍照点和时间建议</p>
            </div>
        </div>
    </div>

    <script>
        const travelData = {
            transport: [
                { route: '大同 → 太原', from: '大同南', to: '太原南', duration: '2.5小时', price: '¥150-180' },
                { route: '太原 → 南京', from: '太原南', to: '南京南', duration: '5小时', price: '¥400-450' },
                { route: '南京 → 大同', from: '南京南', to: '大同南', duration: '6.5小时', price: '¥500-550' }
            ],
            attractions: {
                '大同': ['云冈石窟', '大同古城墙', '大同美食街'],
                '太原': ['晋祠', '蒙山大佛', '柳巷步行街'],
                '南京': ['鸡鸣寺', '玄武湖', '南京博物院', '夫子庙·老门东', '梧桐大道', '中山陵']
            },
            food: {
                '大同': ['刀削面', '羊杂碎', '凉粉', '凤临阁（百年老店）'],
                '太原': ['老鼠窟元宵', '山西老醋冰淇淋', '山西面食'],
                '南京': ['鸭血粉丝汤', '盐水鸭', '桂花糕', '秦淮小吃']
            },
            hotels: [
                { name: '大同云冈酒店', price: '¥380/晚', features: '含早、免费停车、景观房' },
                { name: '太原铜锣湾希尔顿', price: '¥550/晚', features: '五星、地铁直达、健身房' },
                { name: '南京金陵饭店', price: '¥680/晚', features: '历史地标、秦淮河畔、必打卡' }
            ]
        };

        function getAIResponse(question) {
            const q = question.toLowerCase();

            if (q.includes('南京博物院') || q.includes('博物院') || q.includes('预约')) {
                return '南京博物院是国家一级博物馆，建议提前预约。历史馆和民国馆是必逛的两个展馆。建议预留3-4小时参观时间。';
            }

            if (q.includes('云冈石窟') && (q.includes('时间') || q.includes('多长') || q.includes('多久'))) {
                return '云冈石窟是中国四大石窟之一，建议预留3-4小时细细品味。这里绵延1公里的雕刻艺术非常震撼人心。门票价格约¥120。';
            }

            if (q.includes('太原') && q.includes('南京') && (q.includes('高铁') || q.includes('票价') || q.includes('价格') || q.includes('多少钱'))) {
                return '太原到南京的高铁全程约5小时，票价在¥400-450之间。建议提前在12306官网预订。';
            }

            if (q.includes('大同') && (q.includes('美食') || q.includes('好吃') || q.includes('推荐'))) {
                return '大同美食推荐：\n• 刀削面 - 山西特色面食\n• 羊杂碎 - 当地特色小吃\n• 凉粉 - 清爽可口\n• 凤临阁 - 百年老店，必去！\n\n美食街集中在古城附近，晚上去氛围最佳。';
            }

            if (q.includes('晋祠')) {
                return '晋祠是太原最著名的景点，有"不到晋祠，枉来太原"之说。建议游览2-3小时，门票约¥80。这里有"晋祠三绝"，是宋代建筑精华，非常值得一看。';
            }

            if (q.includes('鸡鸣寺') || q.includes('樱花')) {
                return '鸡鸣寺是"南朝四百八十寺"之首，樱花季非常美！门票约¥15。建议游览1-2小时。这里的斋面一定要尝尝，味道很棒。';
            }

            if (q.includes('酒店') || q.includes('住宿') || q.includes('住哪里')) {
                return '推荐以下酒店：\n• 大同云冈酒店（¥380/晚）- 含早、免费停车\n• 太原铜锣湾希尔顿（¥550/晚）- 五星、地铁直达\n• 南京金陵饭店（¥680/晚）- 秦淮河畔、地标酒店\n\n需要我帮您推荐哪个城市的住宿吗？';
            }

            if (q.includes('预算') || q.includes('花费') || q.includes('多少钱')) {
                return '参考预算（5天4晚）：\n• 交通：约¥1000-1200\n• 门票：约¥500\n• 餐饮：约¥600\n• 住宿：约¥2000\n\n总计约 ¥2800 元左右，可以根据个人消费习惯调整。';
            }

            return '抱歉，我不太理解您的问题。您可以试试问：\n• "云冈石窟游览需要多长时间？"\n• "太原到南京的高铁票价是多少？"\n• "推荐一些大同的美食"\n• "南京博物院需要预约吗？"';
        }

        function askQuestion(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            const chatMessages = document.getElementById('chatMessages');

            // 添加用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'message message-user';
            userMsg.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">
                    ${message}
                    <div class="message-time">刚刚</div>
                </div>
            `;
            chatMessages.appendChild(userMsg);

            // 清空输入框
            input.value = '';

            // 添加 AI 响应
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message message-ai';
                const response = getAIResponse(message);
                aiMsg.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        ${response.replace(/\n/g, '<br>')}
                        <div class="message-time">刚刚</div>
                    </div>
                `;
                chatMessages.appendChild(aiMsg);

                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 500);

            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 回车发送消息
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
